name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build
        run: |
          echo "Building the project..."
          echo "Pipeline executed at: $(date)"

      - name: Test
        run: |
          echo "Running tests..."
          test -f public/index.html || exit 1
          test -f public/styles.css || exit 1
          test -f public/js/main.js || exit 1

      - name: Deploy (GitHub Pages)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public